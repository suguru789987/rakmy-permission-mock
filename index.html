<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ラクミー 経営管理｜権限設定（モック v3・3ロール固定）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --green:#1bbf73; --green-d:#159b5d; --blue:#3b82f6; --gray:#9aa0a6;
    --ink:#1f2937; --line:#e3e6ea; --bg:#eef0f3; --panel:#fff; --new:#ff7a59;
  }
  body { font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:var(--bg); }
  .app { display:grid; grid-template-columns:200px 1fr; grid-template-rows:52px 1fr; height:100vh; }
  header { grid-column:1/3; background:#21262b; color:#fff; display:flex; align-items:center; gap:16px; padding:0 18px; }
  .logo { background:var(--green); color:#fff; font-weight:700; font-size:13px; padding:3px 8px; border-radius:4px; }
  .logo small{ font-weight:400; opacity:.85; margin-left:4px;}
  .company { background:#fff; color:#333; border-radius:5px; padding:6px 12px; font-size:13px; display:flex; align-items:center; gap:8px; min-width:230px; }
  .company .ic{ width:16px;height:16px;background:var(--green);border-radius:3px;display:inline-block;}
  header .sp{ flex:1; }
  header .round{ width:26px;height:26px;border-radius:50%;background:#3a4046;display:grid;place-items:center;font-size:13px;color:#cfd3d7;}
  nav { background:#fff; border-right:1px solid var(--line); padding:14px 0; }
  nav a { display:block; padding:11px 20px; color:#374151; text-decoration:none; font-size:14px; cursor:pointer; }
  nav a.active{ color:var(--green-d); font-weight:700; border-left:3px solid var(--green); background:#f3fbf7;}
  nav a:hover{ background:#f6f7f9; }
  nav .sec{ margin-top:10px; color:#6b7280; }
  main { overflow:auto; padding:20px 26px; }
  .titlebar{ display:flex; align-items:center; gap:14px; margin-bottom:16px;}
  .titlebar h1{ font-size:20px; }
  .titlebar .sp{ flex:1; }
  .btn{ border:none; border-radius:7px; padding:9px 18px; font-size:14px; cursor:pointer; font-weight:700; }
  .btn.primary{ background:var(--green); color:#fff;}
  .btn.primary:hover{ background:var(--green-d);}
  .btn.ghost{ background:#fff; border:1px solid var(--line); color:#444;}
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px; }
  .hint{ color:#6b7280; font-size:12.5px; margin:6px 0 14px;}
  .badge-new{ background:var(--new); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; margin-left:7px; vertical-align:middle; }
  .range{ font-size:10.5px; color:#0a7a55; border:1px solid #b8e6d2; background:#f0fbf6; border-radius:5px; padding:1px 6px; margin-left:8px; vertical-align:middle;}
  .feat.locked{ opacity:.85; }
  .lockmsg{ font-size:12px; color:#6b7280; border:1px solid var(--line); background:#f5f7f9; border-radius:6px; padding:6px 12px; white-space:nowrap;}
  .lockmsg.ok{ color:#159b5d; border-color:#bde9d2; background:#f0fbf6;}
  table.list{ border-collapse:collapse; width:100%; font-size:13px; }
  table.list th, table.list td{ border:1px solid var(--line); padding:9px 8px; text-align:center; }
  table.list th{ background:#f5f7f9; font-weight:700; }
  table.list td.name{ text-align:left; font-weight:700; white-space:nowrap; }
  .mk{ font-weight:700; } .mk.op{ color:var(--green-d);} .mk.vw{ color:var(--blue);} .mk.no{ color:#c33;}
  .rowedit{ background:var(--green); color:#fff; border:none; border-radius:6px; padding:6px 14px; cursor:pointer; font-weight:700; }
  .tabs{ display:flex; flex-wrap:wrap; gap:6px; margin:4px 0 16px; border-bottom:2px solid var(--line);}
  .tab{ padding:9px 14px; font-size:13px; cursor:pointer; border:1px solid var(--line); border-bottom:none; border-radius:8px 8px 0 0; background:#f3f5f7; color:#555; position:relative; top:2px;}
  .tab.active{ background:#fff; color:var(--green-d); font-weight:700; border-color:var(--green); border-bottom:2px solid #fff;}
  .tab .dot{ display:inline-block; width:7px;height:7px;border-radius:50%; background:var(--new); margin-left:5px;}
  .feat{ display:flex; align-items:center; padding:11px 6px; border-bottom:1px solid #f0f2f4;}
  .feat:last-child{ border-bottom:none;}
  .feat .fn{ flex:1; font-size:14px;}
  .feat .kindtag{ font-size:10.5px; color:#9aa0a6; border:1px solid var(--line); border-radius:5px; padding:1px 6px; margin-left:8px; vertical-align:middle;}
  .seg{ display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden;}
  .seg button{ border:none; background:#fff; padding:7px 14px; font-size:12.5px; cursor:pointer; color:#667; border-left:1px solid var(--line);}
  .seg button:first-child{ border-left:none;}
  .seg button.on[data-v="0"]{ background:#f0f1f3; color:#888; font-weight:700;}
  .seg button.on[data-v="1"]{ background:var(--blue); color:#fff; font-weight:700;}
  .seg button.on[data-v="2"]{ background:var(--green); color:#fff; font-weight:700;}
  .seg.locked button{ background:#eef3f0; color:#7a9b88; cursor:default; font-weight:700;}
  .bulk{ display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:12.5px; color:#555;}
  .bulk button{ border:1px solid var(--line); background:#fff; border-radius:6px; padding:5px 11px; cursor:pointer; font-size:12px;}
  .roleline{ display:flex; align-items:center; gap:16px; margin-bottom:8px;}
  .roleline .rn{ font-weight:700; font-size:17px;}
  .scopechip{ font-size:12.5px; background:#21262b; color:#fff; border-radius:6px; padding:5px 12px;}
  .legend{ display:flex; gap:14px; font-size:12px; color:#555; flex-wrap:wrap;}
  .legend span b{ padding:1px 7px; border-radius:5px; color:#fff;}
  .hide{ display:none;}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="logo">ラクミー <small>経営管理</small></span>
    <span class="company"><span class="ic"></span>株式会社 麺屋ミライ ▾</span>
    <span class="sp"></span>
    <span class="round">?</span><span class="round">◍</span>
  </header>

  <nav>
    <a onclick="show('list')" id="nav-list">権限一覧</a>
    <a onclick="show('edit')" id="nav-edit">権限編集</a>
    <a class="sec">ダッシュボード</a>
    <a>売上分析</a>
    <a>集計・レポート</a>
    <a class="sec">設定 ▸</a>
  </nav>

  <!-- ============ 一覧 ============ -->
  <main id="view-list">
    <div class="titlebar">
      <h1>権限一覧</h1>
      <div class="legend">
        <span><b style="background:#1bbf73">◯</b> 全許可</span>
        <span><b style="background:#3b82f6">△</b> 一部</span>
        <span><b style="background:#c33">✕</b> なし</span>
      </div>
    </div>
    <div class="panel">
      <p class="hint">権限は <b>従業員 / 店長 / 本部（全権）</b> の3種類で固定。行＝権限、列＝機能カテゴリ。「★」付きは新規実装分を含む。「編集」で設定画面へ。</p>
      <div style="overflow:auto;"><table class="list" id="listTable"></table></div>
    </div>
  </main>

  <!-- ============ 設定 ============ -->
  <main id="view-edit" class="hide">
    <div class="titlebar">
      <h1 id="editTitle">権限編集</h1>
      <div class="sp"></div>
      <button class="btn ghost" onclick="show('list')">一覧へ戻る</button>
      <button class="btn primary" onclick="saveRole()">保存</button>
    </div>

    <div class="panel">
      <div class="roleline">
        <span class="rn" id="roleName"></span>
        <span class="scopechip" id="scopeChip"></span>
      </div>
      <div class="legend" style="margin-bottom:8px;">
        <span><b style="background:#c33">なし</b></span>
        <span><b style="background:#3b82f6">閲覧</b></span>
        <span><b style="background:#1bbf73">操作/可</b></span>
        <span style="color:#9aa0a6;">［閲覧専用］はなし/閲覧 ／［実行］［管理］はなし/可 ／［常時］は閲覧固定</span>
      </div>
      <div class="legend" style="margin-bottom:14px; color:#6b7280;">
        この画面は<b style="background:#21262b">本部管理者</b>専用。編集対象は <b style="background:#1bbf73">従業員</b>・<b style="background:#1bbf73">店長</b> 権限です（本部は全権固定で編集不可）。
      </div>

      <div class="tabs" id="tabs"></div>

      <div class="bulk">
        <span id="tabHint" style="font-weight:700;"></span>
        <span style="flex:1"></span>
        設定可能な機能を一括：
        <button onclick="bulk('max')">全て許可</button>
        <button onclick="bulk('view')">全て閲覧</button>
        <button onclick="bulk('none')">全てなし</button>
      </div>

      <div id="featList"></div>
      <div id="excludedNote" class="hint" style="margin-top:16px;"></div>
    </div>
  </main>
</div>

<script>
/* 機能の性質ごとに選べる状態 */
const KIND = {
  base:   {vals:[1],     lab:{1:'閲覧（既定）'},               tag:'常時',     lock:true},
  view:   {vals:[0,1],   lab:{0:'権限なし',1:'閲覧可能'},        tag:'閲覧専用'},
  edit:   {vals:[0,1,2], lab:{0:'権限なし',1:'閲覧可能',2:'操作可能'}, tag:'設定'},
  action: {vals:[0,2],   lab:{0:'権限なし',2:'実行可'},          tag:'実行'},
  admin:  {vals:[0,2],   lab:{0:'不可',2:'設定可'},             tag:'管理'},
};
const maxV = k => KIND[k].vals[KIND[k].vals.length-1];
const minV = k => KIND[k].vals[0];

/* 機能カテゴリ。k=性質, fixed=本部管理者のみ（設定対象外）, range='shop-self'=店舗時は自店舗のみ, new=★★ */
const CATEGORIES = [
  {id:'dashboard', name:'ダッシュボード', features:[
    {n:'ダッシュボード', k:'base'},{n:'お知らせ', k:'base'},{n:'繁盛店指数', k:'view', new:true}]},
  {id:'sales', name:'売上分析', features:[
    {n:'ABC分析',k:'view'},{n:'商品別分析',k:'view'},{n:'時間帯別分析',k:'view'},{n:'曜日別分析',k:'view'},{n:'支払い種別分析',k:'view'}]},
  {id:'purchase', name:'仕入分析', features:[
    {n:'取引先別分析',k:'view'},{n:'商品別分析',k:'view'},{n:'費目別分析',k:'view'},{n:'商品仕入単価',k:'view'},{n:'平均単価推移',k:'view'}]},
  {id:'detail', name:'詳細分析', features:[{n:'進捗分析',k:'view'}]},
  {id:'report', name:'集計・レポート', features:[
    {n:'予実対比',k:'view'},{n:'年間予実対比',k:'view', new:true},{n:'月次レポート',k:'view'},{n:'日次レポート',k:'view'},
    {n:'日次レポート送信先設定',k:'admin', new:true, fixed:true},{n:'ダウンロード',k:'action'}]},
  {id:'budget', name:'予算管理', features:[
    {n:'予算設定',k:'edit'},{n:'予算開始月設定',k:'admin', new:true, fixed:true},{n:'日次予算設定',k:'edit', new:true}]},
  {id:'inventory', name:'棚卸', features:[
    {n:'棚卸（実施）',k:'action'},{n:'棚卸商品管理',k:'edit', new:true}]},
  {id:'integration', name:'連携設定', hasNew:true, features:[
    {n:'スマレジ(Smaregi) POS連携',k:'admin', new:true, fixed:true},{n:'インフォマート仕入取込',k:'admin', new:true, fixed:true},
    {n:'東芝テックPOS取込',k:'admin', new:true, fixed:true},{n:'ASPIT連携（売上/仕入/棚卸/労務）',k:'admin', new:true, fixed:true}]},
  {id:'label', name:'ラベル', features:[{n:'ラベル（一覧・登録）',k:'edit'}]},
  {id:'org', name:'店舗・組織', features:[
    {n:'店舗情報',k:'edit', range:'shop-self'},{n:'店舗間商品移動',k:'action'},
    {n:'会社情報',k:'admin', fixed:true},{n:'初期設定（アカウント登録）',k:'admin', new:true, fixed:true}]},
  {id:'user', name:'ユーザー・従業員', features:[
    {n:'ユーザー（ログインアカウント）',k:'admin', fixed:true},
    {n:'従業員（店舗スタッフ台帳）',k:'edit', range:'shop-self'},
    {n:'本部従業員管理',k:'admin', new:true, fixed:true}]},
  {id:'order', name:'発注・支払', features:[
    {n:'納品書',k:'edit'},{n:'小口現金',k:'edit'},{n:'お支払い',k:'admin', fixed:true}]},
  {id:'kintai', name:'勤怠連携', hasNew:true, features:[
    {n:'KingOfTime連携',k:'admin', new:true, fixed:true},{n:'スマレジタイムカード連携',k:'admin', new:true, fixed:true}]},
];

const eachFeat = fn => CATEGORIES.forEach(c=>c.features.forEach((f,i)=>fn(c,f,i,c.id+'_'+i)));

/* プリセット（役割ごと）。fixedは scope に応じ自動（本部=可/他=不可） */
const PRESET = {
  staff:  f => ({base:1,view:1,edit:0,action:0,admin:0}[f.k]),
  manager:f => ({base:1,view:1,edit:2,action:2,admin:0}[f.k]),
  full:   f => maxV(f.k),
};
function buildPerm(presetFn, scope){
  const p={}; eachFeat((c,f,i,key)=>{
    p[key] = f.fixed ? (scope==='company'?maxV(f.k):minV(f.k)) : presetFn(f);
  }); return p;
}
let ROLES = [
  {name:'従業員権限',   scope:'shop',    perm:buildPerm(PRESET.staff,'shop')},
  {name:'店長権限',     scope:'shop',    perm:buildPerm(PRESET.manager,'shop')},
  {name:'本部（全権）', scope:'company', perm:buildPerm(PRESET.full,'company'), system:true},
];

let cur = { idx:0, scope:'shop', perm:{}, tab:CATEGORIES[0].id };

/* ---------- 一覧 ---------- */
function catSummary(perm, cid){
  const cat=CATEGORIES.find(c=>c.id===cid);
  const arr=cat.features.map((f,i)=>({v:perm[cid+'_'+i],k:f.k}));
  if(arr.every(x=>x.v===maxV(x.k))) return '<span class="mk op">◯</span>';
  if(arr.every(x=>x.v===minV(x.k))) return '<span class="mk no">✕</span>';
  return '<span class="mk vw">△</span>';
}
function renderList(){
  const t=document.getElementById('listTable');
  let h='<tr><th class="name">権限名</th>';
  CATEGORIES.forEach(c=>h+=`<th>${c.name}${c.hasNew?'<span class="tab"><span class="dot"></span></span>':''}</th>`);
  h+='<th></th></tr>';
  ROLES.forEach((r,ri)=>{
    h+=`<tr><td class="name">${r.name}<br><span style="font-weight:400;color:#9aa0a6;font-size:11px;">${r.scope==='company'?'会社（全社）':'店舗（自店舗）'}</span></td>`;
    CATEGORIES.forEach(c=>h+=`<td>${catSummary(r.perm,c.id)}</td>`);
    h+=`<td>${r.system?'<span style="color:#9aa0a6;font-size:12px;font-weight:700;">全権・固定</span>':`<button class="rowedit" onclick="editRole(${ri})">編集</button>`}</td></tr>`;
  });
  t.innerHTML=h;
}

/* ---------- 切替 ---------- */
function show(v){
  document.getElementById('view-list').classList.toggle('hide', v!=='list');
  document.getElementById('view-edit').classList.toggle('hide', v!=='edit');
  document.getElementById('nav-list').classList.toggle('active', v==='list');
  document.getElementById('nav-edit').classList.toggle('active', v==='edit');
  if(v==='list') renderList();
}
function editRole(ri){
  if(ROLES[ri].system){ alert('「本部（全権）」は全機能固定のため編集できません。'); return; }
  const r=ROLES[ri];
  cur={idx:ri, scope:r.scope, perm:JSON.parse(JSON.stringify(r.perm)), tab:CATEGORIES[0].id};
  document.getElementById('editTitle').textContent='権限編集';
  document.getElementById('roleName').textContent=r.name;
  document.getElementById('scopeChip').textContent='対象範囲：'+(r.scope==='company'?'会社スコープ（全社）':'店舗スコープ（自店舗のみ）');
  renderTabs(); renderFeats(); show('edit');
}

/* ---------- タブ＆機能 ---------- */
const visibleCats = () => CATEGORIES.filter(c=>c.features.some(f=>!f.fixed));
function renderTabs(){
  const vis=visibleCats();
  if(!vis.find(c=>c.id===cur.tab)) cur.tab=vis[0].id;
  document.getElementById('tabs').innerHTML = vis.map(c=>{
    const newVisible=c.features.some(f=>!f.fixed && f.new);
    return `<div class="tab ${c.id===cur.tab?'active':''}" onclick="selTab('${c.id}')">${c.name}${newVisible?'<span class="dot"></span>':''}</div>`;
  }).join('');
}
function selTab(id){ cur.tab=id; renderTabs(); renderFeats(); }
function featRange(f){ if(f.range==='shop-self') return cur.scope==='shop'?'自店舗のみ':'全社'; return ''; }
function renderFeats(){
  const cat=CATEGORIES.find(c=>c.id===cur.tab);
  const feats=cat.features.filter(f=>!f.fixed);     // 本部専用は非表示
  document.getElementById('tabHint').textContent=cat.name+'（'+feats.length+'機能）';
  document.getElementById('featList').innerHTML = feats.map(f=>{
    const i=cat.features.indexOf(f), key=cat.id+'_'+i, kd=KIND[f.k];
    const rng=featRange(f);
    const nameHtml = `${f.n}${f.new?'<span class="badge-new">★★新規実装</span>':''}`
      + `<span class="kindtag">${kd.tag}</span>` + (rng?`<span class="range">範囲：${rng}</span>`:'');
    const v=cur.perm[key], segLock=kd.lock?'locked':'';
    const seg=kd.vals.map(s=>`<button data-v="${s}" class="${v===s?'on':''}" ${kd.lock?'disabled':''} onclick="setVal('${key}',${s})">${kd.lab[s]}</button>`).join('');
    return `<div class="feat"><div class="fn">${nameHtml}</div><div class="seg ${segLock}">${seg}</div></div>`;
  }).join('');
  renderExcluded();
}
function renderExcluded(){
  const names=[]; CATEGORIES.forEach(c=>c.features.forEach(f=>{ if(f.fixed) names.push(f.n); }));
  document.getElementById('excludedNote').innerHTML =
    '※ 本部専用機能（'+names.join(' ／ ')+'）は、この権限には付与されません（本部（全権）のみ利用可）。';
}
function setVal(key,s){ cur.perm[key]=s; renderFeats(); }
function bulk(mode){
  CATEGORIES.find(c=>c.id===cur.tab).features.forEach((f,i)=>{
    if(f.fixed) return;
    const key=cur.tab+'_'+i, vals=KIND[f.k].vals;
    cur.perm[key] = mode==='max'?maxV(f.k) : mode==='none'?minV(f.k) : (vals.includes(1)?1:vals[0]);
  });
  renderFeats();
}
function saveRole(){
  ROLES[cur.idx]={...ROLES[cur.idx], perm:cur.perm};
  alert('「'+ROLES[cur.idx].name+'」の権限を保存しました（モック）。');
  show('list');
}

show('list');
</script>
</body>
</html>
